name: Auto Merge

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  auto-merge:
    if: |
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Get PR Number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          REVIEW_PR: ${{ github.event.pull_request.number }}
          CHECK_PR: ${{ github.event.check_suite.pull_requests[0].number }}
        run: |
          if [ "$EVENT_NAME" = "pull_request_review" ]; then
            echo "number=$REVIEW_PR" >> $GITHUB_OUTPUT
          else
            echo "number=$CHECK_PR" >> $GITHUB_OUTPUT
          fi

      - name: Check PR Status
        id: status
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};

            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            // Skip if already merged or not open
            if (pr.state !== 'open') {
              return { canMerge: false, reason: 'PR is not open' };
            }

            // Check for Claude or Copilot approval
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const aiApproved = reviews.some(r =>
              (r.user?.login === 'copilot' || r.user?.type === 'Bot') && r.state === 'APPROVED'
            );

            if (!aiApproved) {
              return { canMerge: false, reason: 'Waiting for AI (Claude/Copilot) approval' };
            }

            // Check CI status
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });

            const ciPassed = checks.check_runs.every(c =>
              c.status === 'completed' && c.conclusion === 'success'
            );

            if (!ciPassed) {
              return { canMerge: false, reason: 'CI checks not passed' };
            }

            return { canMerge: true, reason: 'All checks passed' };

      - name: Auto Merge
        if: fromJSON(steps.status.outputs.result).canMerge
        run: |
          gh pr merge ${{ steps.pr.outputs.number }} --squash --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log Status
        if: '!fromJSON(steps.status.outputs.result).canMerge'
        run: |
          echo "Auto-merge skipped: ${{ fromJSON(steps.status.outputs.result).reason }}"