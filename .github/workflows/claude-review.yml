name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: false
      model:
        description: 'Model to use (e.g., claude-sonnet-4-20250514)'
        required: false

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      CLAUDE_BASE_URL: ${{ vars.CLAUDE_BASE_URL || 'https://api.anthropic.com' }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      CLAUDE_MODEL: ${{ inputs.model || vars.CLAUDE_MODEL || 'claude-sonnet-4-20250514' }}
    steps:
      - name: Validate Configuration
        run: |
          if [ -z "$CLAUDE_API_KEY" ]; then
            echo "::error::CLAUDE_API_KEY secret is not configured"
            exit 1
          fi
          echo "Using API: $CLAUDE_BASE_URL"
          echo "Using Model: $CLAUDE_MODEL"

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Info
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || inputs.pr_number }}"
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

          gh pr diff $PR_NUMBER | head -c 100000 > pr_diff.txt

          PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
          PR_AUTHOR=$(gh pr view $PR_NUMBER --json author -q '.author.login')
          PR_FILES=$(gh pr view $PR_NUMBER --json files -q '.files[].path' | tr '\n' ' ')

          echo "title=$PR_TITLE" >> $GITHUB_OUTPUT
          echo "author=$PR_AUTHOR" >> $GITHUB_OUTPUT
          echo "files=$PR_FILES" >> $GITHUB_OUTPUT

      - name: Get Conversation History
        id: history
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"

          # Fetch all Claude reviews in a single API call where possible
          # Get reviews (submitted review events) which contain the full review body
          REVIEWS_JSON=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews --paginate 2>/dev/null || echo '[]')

          # Filter for Claude reviews and build proper conversation history
          # Each review is an assistant message; we need to pair them with implied user context
          jq -n '[]' > conversation_history.json

          # Extract Claude reviews sorted by time (oldest first for proper conversation order)
          echo "$REVIEWS_JSON" | jq -r 'sort_by(.submitted_at) | .[] | select(.body | test("🤖.*Claude.*Review|Claude Code Review"; "i")) | .body' | while IFS= read -r review; do
            if [ -n "$review" ]; then
              # Clean the review content (remove header)
              cleaned=$(echo "$review" | sed '1,2d' | sed '/^$/d' | head -c 6000)
              if [ -n "$cleaned" ]; then
                # Add a synthetic user message indicating a review was requested
                jq --arg user "Please review the changes in this PR." --arg assistant "$cleaned" \
                  '. + [{role: "user", content: $user}, {role: "assistant", content: $assistant}]' \
                  conversation_history.json > tmp.json && mv tmp.json conversation_history.json
              fi
            fi
          done

          if [ -s conversation_history.json ] && [ "$(cat conversation_history.json)" != "[]" ]; then
            echo "Found previous Claude reviews"
            echo "has_history=true" >> $GITHUB_OUTPUT
            echo "History message count: $(jq 'length' conversation_history.json)" >> $GITHUB_STEP_SUMMARY
          else
            echo "No previous conversation history"
            jq -n '[]' > conversation_history.json
            echo "has_history=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Review
        id: review
        run: |
          API_URL="${CLAUDE_BASE_URL%/}/v1/messages"
          echo "Calling Claude API at: $API_URL"

          DIFF=$(cat pr_diff.txt)
          TITLE="${{ steps.pr.outputs.title }}"
          AUTHOR="${{ steps.pr.outputs.author }}"
          FILES="${{ steps.pr.outputs.files }}"

          SYSTEM_PROMPT="You are a senior code reviewer. Review pull requests and provide actionable feedback. Be concise and focus on important issues: bugs, security vulnerabilities, performance problems, architectural concerns, and breaking changes. Ignore minor style issues. Output your review in markdown format. End your review with exactly one of these verdicts: **Verdict: APPROVE**, **Verdict: REQUEST_CHANGES**, or **Verdict: COMMENT**. If there are previous reviews in the conversation, reference them and continue the discussion rather than starting fresh."

          USER_PROMPT="Review this pull request:\n\n**Title:** $TITLE\n**Author:** @$AUTHOR\n**Files Changed:** $FILES\n\n**Diff:**\n\`\`\`diff\n$DIFF\n\`\`\`\n\nProvide a concise review with your verdict. If this is a follow-up review after changes, acknowledge what was fixed and focus on remaining issues."

          # Build messages array with conversation history
          # History contains alternating user/assistant messages, add current prompt at end
          if [ -s conversation_history.json ] && [ "$(cat conversation_history.json)" != "[]" ]; then
            # Has history - append current review request
            HISTORY=$(cat conversation_history.json)
            MESSAGES=$(echo "$HISTORY" | jq --arg user "$USER_PROMPT" '. + [{role: "user", content: $user}]')
            echo "Using conversation history with $(echo "$HISTORY" | jq 'length') previous messages"
          else
            # No history - just current message
            MESSAGES=$(jq -n --arg user "$USER_PROMPT" '[{role: "user", content: $user}]')
            echo "No conversation history, starting fresh"
          fi

          PAYLOAD=$(jq -n \
            --arg model "$CLAUDE_MODEL" \
            --arg system "$SYSTEM_PROMPT" \
            --argjson messages "$MESSAGES" \
            '{model: $model, max_tokens: 4096, system: $system, messages: $messages}')

          echo "DEBUG: Messages count:" >> $GITHUB_STEP_SUMMARY
          echo "$MESSAGES" | jq 'length' >> $GITHUB_STEP_SUMMARY

          RESPONSE=$(curl -s -w "\n%{http_code}" "$API_URL" \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::API call failed with status $HTTP_CODE"
            echo "Response: $BODY"
            exit 1
          fi

          # Extract text from response (handle both Anthropic and OpenRouter formats)
          # OpenRouter may return multiple content types (thinking, text, redacted_thinking)
          echo "DEBUG: Response structure:" >> $GITHUB_STEP_SUMMARY
          echo "$BODY" | jq '.content | map({type: .type})' >> $GITHUB_STEP_SUMMARY

          # Try text content first (Anthropic format)
          REVIEW=$(echo "$BODY" | jq -r '[.content[] | select(.type == "text")][0].text // empty')

          # If no text, try thinking content (some models like mimo only return thinking)
          if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
            REVIEW=$(echo "$BODY" | jq -r '[.content[] | select(.type == "thinking")][0].thinking // empty')
          fi

          # Also try alternative paths for OpenAI-compatible format
          if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
            REVIEW=$(echo "$BODY" | jq -r '.choices[0].message.content // empty')
          fi

          if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
            echo "::error::Failed to extract review from API response"
            echo "Response: $BODY"
            exit 1
          fi

          echo "review<<REVIEW_EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW" >> $GITHUB_OUTPUT
          echo "REVIEW_EOF" >> $GITHUB_OUTPUT

          # Also write to file for safe transfer to next step
          echo "$REVIEW" > review.txt

          if echo "$REVIEW" | grep -qiE '\*\*Verdict:\s*APPROVE\*\*|Verdict:\s*APPROVE'; then
            echo "action=APPROVE" >> $GITHUB_OUTPUT
          elif echo "$REVIEW" | grep -qiE '\*\*Verdict:\s*REQUEST_CHANGES\*\*|Verdict:\s*REQUEST_CHANGES'; then
            echo "action=REQUEST_CHANGES" >> $GITHUB_OUTPUT
          else
            echo "action=COMMENT" >> $GITHUB_OUTPUT
          fi

      - name: Submit Review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          ACTION="${{ steps.review.outputs.action }}"

          # Read review from file (safer than GitHub output for special chars)
          REVIEW=$(cat review.txt)

          # Write review to file safely
          echo "🤖 **Claude Code Review**" > review_body.txt
          echo "" >> review_body.txt
          cat review.txt >> review_body.txt

          case "$ACTION" in
            APPROVE)
              jq -n --rawfile body review_body.txt '{event: "APPROVE", body: $body}' | \
                gh api --method POST repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews \
                  --input - || gh pr comment $PR_NUMBER --body-file review_body.txt
              ;;
            REQUEST_CHANGES)
              jq -n --rawfile body review_body.txt '{event: "REQUEST_CHANGES", body: $body}' | \
                gh api --method POST repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews \
                  --input - || gh pr comment $PR_NUMBER --body-file review_body.txt
              ;;
            *)
              gh pr comment $PR_NUMBER --body-file review_body.txt
              ;;
          esac

      - name: Summary
        run: |
          echo "## Claude Code Review" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| PR | #${{ steps.pr.outputs.number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model | \`$CLAUDE_MODEL\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Action | ${{ steps.review.outputs.action }} |" >> $GITHUB_STEP_SUMMARY